# meta-openxt-ui — UIVM and dom0 display/input integration
BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    ${LAYERDIR}/recipes-*/*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "openxt-ui"
BBFILE_PATTERN_openxt-ui := "^${LAYERDIR}/"
BBFILE_PRIORITY_openxt-ui = "11"

LAYERVERSION_openxt-ui = "1"
LAYERSERIES_COMPAT_openxt-ui = "dunfell"

LAYERDEPENDS_openxt-ui = " \
    openxt-base \
    openxt-domains \
    gnome-layer \
    xfce-layer \
    vglass \
    meta-java \
"

LAYERDESCRIPTION_openxt-ui = "OpenXT UI layer: UIVM, glass/display, dom0 UI integration"

require ${LAYERDIR}/conf/distro/include/openxt-ui.inc
