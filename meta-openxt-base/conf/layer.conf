# meta-openxt-base — platform core (initially hosts full tree; domains/UI extracted next)
BBPATH .= ":${LAYERDIR}"

BBMASK += " \
    meta-virtualization/recipes-extended/images/xen-guest-image-minimal.bb \
    meta-virtualization/recipes-devtools/go/go-build_git.bb \
    meta-virtualization/recipes-core/runx/runx_git.bb \
"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    ${LAYERDIR}/recipes-*/*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "openxt-base"
BBFILE_PATTERN_openxt-base := "^${LAYERDIR}/"
BBFILE_PRIORITY_openxt-base = "9"

LAYERVERSION_openxt-base = "1"
LAYERSERIES_COMPAT_openxt-base = "dunfell"

# Full deps retained until domains/UI extraction; narrowed in follow-up commits.
LAYERDEPENDS_openxt-base = " \
    core \
    openembedded-layer \
    meta-python \
    virtualization-layer \
    selinux \
    intel \
    meta-openxt-haskell-platform \
    meta-openxt-ocaml-platform \
    gnome-layer \
    xfce-layer \
    vglass \
    meta-java \
"

LAYERDESCRIPTION_openxt-base = "OpenXT base layer: dom0, toolstack, security, installer, stubdomain"

LICENSE_PATH += " ${LAYERDIR}/files/additional-licenses/"
